# ==============================================================================
# Docker Compose for Snow Atlas Local Application & Persistent Environment
# ==============================================================================

version: '3.8'

services:
  snow-atlas-app:
    build:
      context: .
      dockerfile: ./deployment/docker/Dockerfile.applet
    container_name: snow-atlas-suite-local
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
